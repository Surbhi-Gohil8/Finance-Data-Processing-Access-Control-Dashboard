openapi: 3.0.0
info:
  title: Finance Data Processing Dashboard API
  description: Access Control Dashboard for Finance management
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Created
  /auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Success
  /dashboard/summary:
    get:
      summary: Get dashboard summary
      tags:
        - Dashboard
      responses:
        '200':
          description: Summary metrics retrieved
